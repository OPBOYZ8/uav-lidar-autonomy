# UAV LiDAR Stack - Hector Mapping Configuration
# ==================================================
# hector_mapping performs 2D LiDAR SLAM without requiring odometry.
# It uses scan-to-map matching (correlative scan matching with multi-resolution
# maps) to estimate the robot pose purely from laser scan data.
#
# This is ideal for UAV deployments where wheel odometry is unavailable and
# IMU-based odometry is unreliable without careful calibration.
#
# Reference: S. Kohlbrecher et al., "A Flexible and Scalable SLAM System with
#            Full 3D Motion Estimation", SSRR 2011.

# ---- Frame IDs ----
map_frame:  map          # Global map frame name
base_frame: base_link    # Robot base frame (same as URDF base_link)
odom_frame: base_link    # No odometry source; set equal to base_frame

# ---- Map Parameters ----
map_resolution:    0.05      # metres per cell (5cm resolution)
map_size:          1024      # cells (512 * 0.05 = 51.2m map extent each side)
map_start_x:       0.5       # fraction: map origin X (0=left edge, 0.5=centre)
map_start_y:       0.5       # fraction: map origin Y
map_update_distance_thresh: 0.05   # update map after moving 5cm
map_update_angle_thresh:    0.0873 # update map after rotating 5°

# ---- Scan Matching ----
# laser_min_dist / laser_max_dist clip the laser returns fed to the matcher
laser_min_dist: 0.1     # metres
laser_max_dist: 50.0    # metres

# Number of scan matcher iterations per update
occ_thresh: 0.9         # occupancy probability threshold to mark cell occupied

# Scan matcher linearisation point update distance (metres)
laser_z_min_value: -0.2
laser_z_max_value:  0.2

# ---- Multi-Resolution Map Levels ----
# Higher levels = coarser resolution used for initial alignment
# Lower levels  = finer resolution for precise localisation
# Typical: 3 levels provides good accuracy/speed tradeoff for indoor SLAM
map_multi_res_levels: 3

# ---- Update Control ----
update_factor_free:     0.4    # Probability update for free space rays
update_factor_occupied: 0.9    # Probability update for occupied returns

# ---- TF Publishing ----
pub_map_to_baselink_transform: true   # hector_mapping publishes map → base_link
tf_map_scanmatch_transform_frame_name: scanmatcher_frame

# ---- Pose Covariance ----
# Used in the published PoseStamped; not used for filtering (no filter in hector)
scan_subscriber_queue_size: 5
use_tf_scan_transformation:  true
advertise_map_service:       true
